<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DailyDeen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

  <h1>🌙 DailyDeen</h1>

  <div class="card">
    <h3>🔥 Streak</h3>
    <p id="streak">0</p>
  </div>

  <div class="card">
    <h3>⭐ XP</h3>
    <p id="xp">0</p>

    <div class="progress-container">
      <div id="xpBar" class="progress-bar"></div>
    </div>

    <p id="xpText">0 / 100 XP</p>
  </div>
<div class="card">
  <h3>📖 Daily Qur'an</h3>
  <p id="quran">Loading...</p>
</div>

<div class="card">
  <h3>🕌 Daily Hadith</h3>
  <p id="hadith">Loading...</p>
</div>

  <a class="btn" href="challenge.html">🎯 Go to Challenge</a>
  <a class="btn" href="progress.html">📊 Progress</a>
  <a class="btn" href="settings.html">⚙️ Settings</a>

</div>

<script src="js/storage.js"></script>
<script src="js/app.js"></script>

</body>
</html>
